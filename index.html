<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Diff3MF | Slicer Setting Comparison</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&family=JetBrains+Mono&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #0f172a; color: #f8fafc; }
        .mono { font-family: 'JetBrains Mono', monospace; }
        .custom-scrollbar::-webkit-scrollbar { width: 6px; height: 6px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: #1e293b; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #334155; border-radius: 10px; }
        .custom-scrollbar::-webkit-scrollbar-thumb:hover { background: #475569; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo } = React;

        // --- Helpers & Logic ---
        
        const CATEGORY_MAP = {
            'Quality': ['layer_height', 'width', 'line_width', 'precision', 'resolution', 'seam', 'fuzzy', 'ironing'],
            'Strength': ['wall', 'perimeter', 'infill', 'shell', 'top_surface', 'bottom_surface', 'sparse', 'solid', 'loops'],
            'Speed': ['speed', 'accel', 'jerk', 'time', 'travel', 'volumetric', 'jerk'],
            'Support': ['support', 'brim', 'raft', 'skirt', 'adhesion', 'tree'],
            'Cooling': ['fan', 'cool', 'temp', 'bed', 'chamber', 'overhang_speed'],
            'Filament': ['filament', 'retract', 'flow', 'pressure_advance', 'k_value', 'nozzle', 'diameter', 'density'],
        };

        const getCategory = (key) => {
            const k = key.toLowerCase();
            for (const [cat, keywords] of Object.entries(CATEGORY_MAP)) {
                if (keywords.some(kw => k.includes(kw))) return cat;
            }
            return 'Others';
        };

        const parseINI = (text) => {
            const lines = text.split(/\r?\n/);
            const data = {};
            lines.forEach(line => {
                const trimmed = line.trim();
                if (!trimmed || trimmed.startsWith('<') || trimmed.startsWith(';') || trimmed.startsWith('#') || trimmed.startsWith('[')) return;
                
                const parts = trimmed.split('=');
                if (parts.length >= 2) {
                    const key = parts[0].trim();
                    const val = parts.slice(1).join('=').trim();
                    data[key] = val;
                }
            });
            return data;
        };

        const flattenJSON = (obj, prefix = '') => {
            let res = {};
            for (const [key, value] of Object.entries(obj)) {
                const newKey = prefix ? `${prefix}.${key}` : key;
                if (value && typeof value === 'object' && !Array.isArray(value)) {
                    Object.assign(res, flattenJSON(value, newKey));
                } else {
                    res[newKey] = Array.isArray(value) ? value.join(', ') : String(value);
                }
            }
            return res;
        };

        const updateINI = (originalText, updatedMap) => {
            const lines = originalText.split(/\r?\n/);
            return lines.map(line => {
                const trimmed = line.trim();
                if (!trimmed || trimmed.startsWith('<') || trimmed.startsWith(';') || trimmed.startsWith('#') || trimmed.startsWith('[')) return line;
                const eqIdx = line.indexOf('=');
                if (eqIdx === -1) return line;
                const key = line.substring(0, eqIdx).trim();
                if (updatedMap.hasOwnProperty(key)) {
                    return `${key} = ${updatedMap[key]}`;
                }
                return line;
            }).join('\n');
        };

        const Icon = ({ name }) => {
            const icons = {
                upload: <svg className="w-6 h-6" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M7 16a4 4 0 01-.88-7.903A5 5 0 1115.9 6L16 6a5 5 0 011 9.9M15 13l-3-3m0 0l-3 3m3-3v12" /></svg>,
                sync: <svg className="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M13 5l7 7m0 0l-7 7m7-7H3" /></svg>,
                download: <svg className="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4" /></svg>,
                search: <svg className="w-4 h-4 text-slate-500" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z" /></svg>,
                alert: <svg className="w-12 h-12 text-slate-600" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z" /></svg>,
                coffee: <svg className="w-4 h-4" viewBox="0 0 24 24" fill="currentColor"><path d="M20.25 10.5H18V9.75c0-1.242-1.008-2.25-2.25-2.25H4.5c-1.242 0-2.25 1.008-2.25 2.25v8.25c0 2.481 2.019 4.5 4.5 4.5h7.5c2.481 0 4.5-2.019 4.5-4.5V13.5h1.5c1.654 0 3-1.346 3-3s-1.346-3-3-3zm-1.5 1.5V12h1.5c.827 0 1.5.673 1.5 1.5s-.673 1.5-1.5 1.5H18v-3h.75zM4.5 9h11.25c.414 0 .75.336.75.75V18c0 1.654-1.346 3-3 3h-7.5c-1.654 0-3-1.346-3-3V9.75c0-.414.336-.75.75-.75zM5.25 12a.75.75 0 01.75-.75h7.5a.75.75 0 010 1.5h-7.5a.75.75 0 01-.75-.75zM5.25 15a.75.75 0 01.75-.75h5.25a.75.75 0 010 1.5h-5.25a.75.75 0 01-.75-.75z"/></svg>
            };
            return icons[name] || null;
        };

        function App() {
            const [fileA, setFileA] = useState({ name: '', zip: null, configs: {} });
            const [fileB, setFileB] = useState({ name: '', zip: null, configs: {} });
            const [loading, setLoading] = useState(false);
            const [activeTab, setActiveTab] = useState('All');
            const [search, setSearch] = useState('');
            const [showOnlyDiffs, setShowOnlyDiffs] = useState(true);

            const processFile = async (file) => {
                const zip = await JSZip.loadAsync(file);
                const configs = {};
                for (const [path, zipObj] of Object.entries(zip.files)) {
                    if (path.startsWith('3D/')) continue;
                    if (path.endsWith('.config') || path.endsWith('.ini') || path.endsWith('.json')) {
                        const text = await zipObj.async('string');
                        let parsed = {};
                        let isJson = false;
                        if (text.trim().startsWith('{')) {
                            try {
                                parsed = flattenJSON(JSON.parse(text));
                                isJson = true;
                            } catch(e) {}
                        }
                        if (Object.keys(parsed).length === 0) {
                            parsed = parseINI(text);
                        }
                        if (Object.keys(parsed).length > 0) {
                            configs[path] = { parsed, raw: text, isJson };
                        }
                    }
                }
                return { name: file.name, zip, configs };
            };

            const handleUpload = async (e, side) => {
                const file = e.target.files[0];
                if (!file) return;
                setLoading(true);
                try {
                    const result = await processFile(file);
                    if (side === 'A') setFileA(result);
                    else setFileB(result);
                } catch (err) {
                    console.error(err);
                    alert("Error processing 3MF: " + err.message);
                }
                setLoading(false);
            };

            const transferSetting = (path, key) => {
                const valA = fileA.configs[path].parsed[key];
                setFileB(prev => {
                    const newConfigs = { ...prev.configs };
                    if (!newConfigs[path]) return prev;
                    newConfigs[path].parsed[key] = valA;
                    return { ...prev, configs: newConfigs };
                });
            };

            const exportFile = async () => {
                setLoading(true);
                const zip = fileB.zip;
                for (const [path, config] of Object.entries(fileB.configs)) {
                    let updatedText = "";
                    if (config.isJson) {
                        updatedText = JSON.stringify(config.parsed, null, 2);
                    } else {
                        updatedText = updateINI(config.raw, config.parsed);
                    }
                    zip.file(path, updatedText);
                }
                const blob = await zip.generateAsync({ type: 'blob' });
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = `Diff3MF_${fileB.name}`;
                a.click();
                setLoading(false);
            };

            const diffList = useMemo(() => {
                const results = [];
                const paths = new Set([...Object.keys(fileA.configs), ...Object.keys(fileB.configs)]);
                paths.forEach(path => {
                    const cA = fileA.configs[path]?.parsed || {};
                    const cB = fileB.configs[path]?.parsed || {};
                    const keys = new Set([...Object.keys(cA), ...Object.keys(cB)]);
                    keys.forEach(key => {
                        const vA = cA[key];
                        const vB = cB[key];
                        const isDiff = vA !== vB;
                        const cat = getCategory(key);
                        if (showOnlyDiffs && !isDiff) return;
                        if (activeTab !== 'All' && cat !== activeTab) return;
                        if (search && !key.toLowerCase().includes(search.toLowerCase())) return;
                        results.push({ path, key, vA, vB, isDiff, cat });
                    });
                });
                return results.sort((a, b) => a.key.localeCompare(b.key));
            }, [fileA, fileB, showOnlyDiffs, activeTab, search]);

            return (
                <div className="min-h-screen flex flex-col p-4 md:p-8 max-w-7xl mx-auto">
                    {/* Main Content Area */}
                    <div className="flex-1">
                        <div className="flex flex-col md:flex-row justify-between items-center mb-8 gap-4 text-center md:text-left">
                            <div>
                                <h1 className="text-3xl font-black tracking-tight flex items-center justify-center md:justify-start gap-2 text-white">
                                    <span className="text-blue-500">DIFF</span>3MF
                                </h1>
                                <p className="text-slate-400 text-sm italic">Synchronizing the Maker community, one profile at a time.</p>
                            </div>
                            {fileB.name && (
                                <button onClick={exportFile} className="bg-blue-600 hover:bg-blue-500 text-white px-6 py-2.5 rounded-full font-bold flex items-center gap-2 transition-all shadow-lg shadow-blue-900/40">
                                    <Icon name="download" /> Export Modified 3MF
                                </button>
                            )}
                        </div>

                        <div className="grid grid-cols-1 md:grid-cols-2 gap-6 mb-8">
                            {[
                                { label: 'Source (File A)', state: fileA, side: 'A', color: 'blue' },
                                { label: 'Target (File B)', state: fileB, side: 'B', color: 'emerald' }
                            ].map(box => (
                                <div key={box.side} className={`relative p-6 rounded-2xl border-2 border-dashed transition-all bg-slate-900/50 ${box.state.name ? `border-${box.color}-500/50 bg-${box.color}-500/5` : 'border-slate-800 hover:border-slate-600'}`}>
                                    <input type="file" accept=".3mf" onChange={(e) => handleUpload(e, box.side)} className="absolute inset-0 opacity-0 cursor-pointer z-10" />
                                    <div className="flex items-center gap-4">
                                        <div className={`p-3 rounded-xl ${box.state.name ? (box.side === 'A' ? 'bg-blue-500' : 'bg-emerald-500') : 'bg-slate-800 text-slate-400'}`}>
                                            <Icon name="upload" />
                                        </div>
                                        <div className="overflow-hidden text-left">
                                            <p className="text-[10px] text-slate-500 uppercase font-black tracking-widest mb-0.5">{box.label}</p>
                                            <p className="font-semibold truncate text-slate-200">{box.state.name || 'Click to upload .3mf'}</p>
                                        </div>
                                    </div>
                                </div>
                            ))}
                        </div>

                        {fileA.name && fileB.name ? (
                            <div className="bg-slate-900 rounded-3xl border border-slate-800 overflow-hidden shadow-2xl flex flex-col h-[60vh]">
                                <div className="p-4 border-b border-slate-800 flex flex-wrap items-center gap-4 bg-slate-900/80 backdrop-blur sticky top-0 z-20">
                                    <div className="relative flex-1 min-w-[240px]">
                                        <div className="absolute left-3 top-1/2 -translate-y-1/2"><Icon name="search" /></div>
                                        <input type="text" placeholder="Search settings..." className="w-full bg-slate-950 border border-slate-800 rounded-xl py-2 pl-9 pr-4 text-sm focus:outline-none focus:ring-1 focus:ring-blue-500 text-slate-300" value={search} onChange={e => setSearch(e.target.value)} />
                                    </div>
                                    <div className="flex gap-1 overflow-x-auto pb-1 custom-scrollbar">
                                        {['All', 'Quality', 'Strength', 'Speed', 'Support', 'Cooling', 'Filament', 'Others'].map(cat => (
                                            <button key={cat} onClick={() => setActiveTab(cat)} className={`px-3 py-1.5 rounded-lg text-[10px] font-black uppercase transition-all whitespace-nowrap ${activeTab === cat ? 'bg-blue-600 text-white' : 'bg-slate-800 text-slate-500 hover:text-slate-300'}`}>
                                                {cat}
                                            </button>
                                        ))}
                                    </div>
                                    <label className="flex items-center gap-2 cursor-pointer text-xs font-bold text-slate-400 whitespace-nowrap">
                                        <input type="checkbox" checked={showOnlyDiffs} onChange={e => setShowOnlyDiffs(e.target.checked)} className="w-4 h-4 rounded border-slate-800 bg-slate-950 text-blue-500 focus:ring-0" />
                                        Diffs Only
                                    </label>
                                </div>

                                <div className="flex-1 overflow-auto custom-scrollbar">
                                    <table className="w-full text-left border-collapse">
                                        <thead className="sticky top-0 bg-slate-900 z-10 border-b border-slate-800">
                                            <tr className="text-[10px] font-black uppercase text-slate-500 tracking-wider">
                                                <th className="p-4 w-1/3">Setting Name</th>
                                                <th className="p-4 w-1/4">Source (A)</th>
                                                <th className="p-4 w-12 text-center">Sync</th>
                                                <th className="p-4 w-1/4">Target (B)</th>
                                            </tr>
                                        </thead>
                                        <tbody className="divide-y divide-slate-800/50">
                                            {diffList.length === 0 ? (
                                                <tr><td colSpan={4} className="p-20 text-center text-slate-600 italic">No slicer settings found.</td></tr>
                                            ) : (
                                                diffList.map((item, idx) => (
                                                    <tr key={`${item.path}-${item.key}-${idx}`} className="group hover:bg-slate-800/30 transition-colors">
                                                        <td className="p-4">
                                                            <div className="flex items-center gap-2 mb-0.5">
                                                                <div className={`text-[9px] px-1.5 py-0.5 rounded font-black uppercase ${item.cat === 'Others' ? 'bg-slate-800 text-slate-500' : 'bg-blue-500/20 text-blue-400'}`}>
                                                                    {item.cat}
                                                                </div>
                                                                <div className="text-[9px] text-slate-600 font-mono italic">{item.path.split('/').pop()}</div>
                                                            </div>
                                                            <div className="mono text-[11px] text-slate-200 break-all font-semibold">{item.key}</div>
                                                        </td>
                                                        <td className={`p-4 mono text-[11px] ${item.isDiff ? 'text-blue-400 font-bold' : 'text-slate-500'}`}>
                                                            {item.vA ?? <span className="opacity-20 italic">Empty</span>}
                                                        </td>
                                                        <td className="p-4 text-center">
                                                            {item.isDiff && (
                                                                <button onClick={() => transferSetting(item.path, item.key)} className="p-2 rounded-lg bg-slate-800 hover:bg-blue-600 text-white transition-all transform hover:scale-110 active:scale-95 shadow-lg shadow-black/50">
                                                                    <Icon name="sync" />
                                                                </button>
                                                            )}
                                                        </td>
                                                        <td className={`p-4 mono text-[11px] ${item.isDiff ? 'text-emerald-400 font-bold' : 'text-slate-500'}`}>
                                                            {item.vB ?? <span className="opacity-20 italic">Empty</span>}
                                                        </td>
                                                    </tr>
                                                ))
                                            )}
                                        </tbody>
                                    </table>
                                </div>
                            </div>
                        ) : (
                            <div className="flex-1 flex flex-col items-center justify-center py-20 opacity-40">
                                <Icon name="alert" />
                                <h2 className="text-xl font-bold mt-4 text-slate-200">Waiting for 3MF files...</h2>
                                <p className="text-sm mt-2 text-center max-w-xs text-slate-400 text-balance">Load two project files to compare actual print settings like speed, walls, and infill.</p>
                            </div>
                        )}
                    </div>

                    {/* Footer */}
                    <footer className="mt-12 mb-4 pt-8 border-t border-slate-800/50 flex flex-col md:flex-row items-center justify-between gap-6">
                        <div className="text-slate-500 text-sm font-medium flex items-center gap-2">
                            <span>Project by</span>
                            <a href="https://techjeeper.com" target="_blank" rel="noopener noreferrer" className="text-blue-500 hover:text-blue-400 font-bold transition-colors">
                                TechJeeper Designs
                            </a>
                        </div>
                        
                        <a 
                            href="https://www.buymeacoffee.com/printventory" 
                            target="_blank" 
                            rel="noopener noreferrer"
                            className="flex items-center gap-3 bg-[#FFDD00] hover:bg-[#FFEA00] text-[#000000] px-5 py-2.5 rounded-xl font-black text-sm transition-all transform hover:scale-105 active:scale-95 shadow-lg shadow-yellow-900/10"
                        >
                            <Icon name="coffee" />
                            <span>Buy Me a Coffee</span>
                        </a>
                    </footer>

                    {loading && (
                        <div className="fixed inset-0 bg-slate-950/80 backdrop-blur-sm flex items-center justify-center z-50">
                            <div className="flex flex-col items-center">
                                <div className="w-12 h-12 border-4 border-blue-600 border-t-transparent rounded-full animate-spin mb-4"></div>
                                <p className="text-white font-black tracking-widest text-xs uppercase">Reading Slicer Metadata...</p>
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
